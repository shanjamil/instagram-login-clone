<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <Section class="box1">
        <div class="upper">
            <div class="logo">
                <img src="instalogo.png" alt="Instagram">
            </div>
            <div class="labs">
                <div class="labels">
                    <label for="username"></label>
                    <input type="text" name="username" placeholder="Phone number, username, or email">
                </div>
                <div class="labels label-password">
                    <label for="password"></label>
                    <input type="password" name="password" placeholder="Password">
                </div>
            </div>
        </div>
        <button class="login">Log in</button>
        <div class="or-divider">
            <span>OR</span>
        </div>
        <div class="labl-fb">
            <img src="fb icon.jpg" alt="FB">
            <div>Log in with Facebook</div>
        </div>
        <div class="forgot-pw">
            Forgot password?
        </div>
        </div>
    </Section>
    <div class="lowerp2">
        <div>Dont have an account? </div>
        <div class="signup">Sign up</div>
    </div>
    <footer>
        <div class="links">
        <a href="https://about.meta.com/">Meta</a>
        <a href="https://about.instagram.com/">About</a>
        <a href="https://about.instagram.com/blog/">Blog</a>
        <a href="https://about.instagram.com/about-us/careers">Jobs</a>
        <a href="https://help.instagram.com/">Help</a>
        <a href="https://developers.facebook.com/docs/instagram">API</a>
        <a href="https://www.instagram.com/legal/privacy/?hl=en">Privacy</a>
        <a href="https://www.instagram.com/legal/terms/?hl=en">terms</a>
        <a href="https://www.instagram.com/explore/locations/?hl=en">Locations</a>
        <a href="https://www.instagram.com/web/lite/?hl=en">Instagram Lite</a>
        <a href="https://www.meta.ai/?utm_source=foa_web_footer">Meta Ai</a>
        <a href="https://www.threads.com/">Threads</a>
        <a href="https://www.facebook.com/help/instagram/261704639352628?hl=en">Contact Uploading & Non-Users</a>
        <a href="https://www.instagram.com/accounts/meta_verified/?entrypoint=web_footer&hl=en">Meta Verified</a>
        </div>
        <div class="end">© 2025 Instagram from Meta</div>
    </footer>
</body>

</html>
